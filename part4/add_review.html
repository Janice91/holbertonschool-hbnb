<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <img src="logo.png" alt="HBnB Logo" class="logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
</header>
<main>
    <h1>Add a Review</h1>
    <form id="review-form" class="add-review">
        <label for="rating">Rating (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" required>
        <label for="comment">Comment:</label>
        <textarea id="comment" name="comment" rows="4" required></textarea>
        <button type="submit">Submit Review</button>
        <p id="review-error" style="color: red; display: none;"></p>
    </form>
</main>
<footer>
    <p>All rights reserved</p>
</footer>
<script src="scripts.js"></script>
</body>
</html>
