<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <img src="logo.png" alt="HBnB Logo" class="logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button" id="login-link">Login</a>
    </nav>
</header>
<main>
    <section class="place-details" id="place-details">
        <h1 id="place-name">Loading...</h1>
        <div class="place-info">
            <p>Host: <span id="place-host"></span></p>
            <p>Price: <span id="place-price"></span>€/night</p>
            <p>Description: <span id="place-description"></span></p>
            <p>Amenities: <span id="place-amenities"></span></p>
        </div>
    </section>
    <section>
        <h2>Reviews</h2>
        <div id="reviews-container"></div>
    </section>
    <section id="add-review" style="display: none;">
        <a id="add-review-link" href="add_review.html">
            <button type="button">Add Review</button>
        </a>
    </section>
</main>
<footer>
    <p>All rights reserved</p>
</footer>
<script src="scripts.js"></script>
</body>
</html>
